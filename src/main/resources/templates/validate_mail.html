<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Type" content="text/html; charset=ISO-8859-1" />
	<title>Valide su Mail</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
</head>
<body>
<form method="GET" th:action="@{/formValidate}" id="formValidate" class="container">
	<div class="form-group"></div>
	<label>Escriba su Contraseña</label>
		<input type="text" class="form-control" name="anterior" placeholder="nombre"/>
	<br></br>
	<label>Repita su Contraseña</label>
		<input type="text" class="form-control" name="nueva" placeholder="Correo"/>
	<br></br>
	<button type="submit" class="btn btn-success">Guardar Contraseña</button>
</form>
</body>
</html>
