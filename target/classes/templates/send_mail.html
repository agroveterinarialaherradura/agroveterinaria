<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Type" content="text/html; charset=ISO-8859-1" />
	<title>Customer Page</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
</head>
<body>
<br />
<form method="GET" th:action="@{/formMail}" id="emailForm" class="container">
	<div class="form-group"></div>
	<label>Username</label>
	<input type="text" class="form-control" name="username" placeholder="username"/>
	<label>Correo</label>
	<input type="text" class="form-control" name="mail" placeholder="Correo"/>
	<button type="submit" class="btn btn-success">Enviar Correo</button>
</form>
<br /><br />
<span th:text="${message}"></span><br />
</body>
</html>
